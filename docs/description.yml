extension:
  name: dodo
  description: "Run .do files in DuckDB"
  version: 0.2.0
  language: C++
  build: cmake
  license: MIT
  maintainers:
    - korenmiklos

repo:
  github: codedthinking/dodo
  ref: main

docs:
  hello_world: |
    -- Run .do commands in DuckDB
    use "data/firms.csv", clear;
    keep if year >= 2020;
    generate profit = revenue - cost;
    list;
  extended_description: |
    dodo reads .do file commands and executes them on DuckDB's analytical
    engine. Supports data manipulation (keep, drop, generate, replace,
    rename, sort, egen, collapse, reshape, merge, duplicates, expand),
    inspection (list, count, summarize, tabulate, describe, history, show sql),
    state management (undo, redo, preserve, restore, tempfile), panel data
    (xtset, tsset, L./F./D. operators), and I/O (use, save, append,
    import/export delimited). Run .do files with `do "script.do"`.
    The standalone `dodoc` compiler translates .do files to formatted SQL
    without requiring DuckDB. Inspired by Kezdi.jl.
